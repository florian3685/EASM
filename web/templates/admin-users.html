<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Users · link-ed.it CyberScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script defer src="/static/js/common.js"></script>
  <script defer src="/static/js/admin-users.js"></script>
</head>
<body data-page="admin-users">
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/dashboard">
        <span class="brand-logo-wrap"><img class="brand-logo" src="/static/img/link-ed.it-logo.png" alt="link-ed.it Consulting & Services"></span>
        <span><span class="brand-title">CyberScan</span><span class="brand-subtitle">Security operations console</span></span>
      </a>
      <nav class="primary-nav" aria-label="Main navigation">
        <a href="/dashboard" data-route-link="dashboard"><i data-lucide="layout-dashboard"></i>Dashboard</a>
        <a href="/scans" data-route-link="scans"><i data-lucide="radar"></i>Scans</a>
        <a href="/reports" data-route-link="reports"><i data-lucide="file-text"></i>Reports</a>
        <a href="/admin/users" data-route-link="admin-users" data-admin-only="true"><i data-lucide="users"></i>Users</a>
      </nav>
      <div class="top-actions">
        <button class="icon-button" type="button" data-command-open title="Command palette" aria-label="Command palette"><i data-lucide="search"></i></button>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme"></button>
        <div class="userbox"><span id="userLabel">local</span><a class="logout" href="/logout"><i data-lucide="log-out"></i>Logout</a></div>
      </div>
    </header>

    <main class="page">
      <div class="page-head">
        <div>
          <p class="eyebrow">Admin</p>
          <h1 class="page-title">Users</h1>
          <p class="page-copy">Team access, roles and account status.</p>
        </div>
        <div class="toolbar">
          <a class="secondary" href="/admin/api-keys"><i data-lucide="key-round"></i>API Keys</a>
        </div>
      </div>

      <div class="grid admin-grid">
        <form id="userForm" class="admin-form">
          <label>Username
            <input id="adminUsername" type="text" placeholder="max.mustermann" autocomplete="off">
          </label>
          <label>Password
            <input id="adminPassword" type="password" placeholder="leave blank to keep existing password" autocomplete="new-password">
          </label>
          <label>Role
            <select id="adminRole"></select>
          </label>
          <label class="inline-check">
            <span>Active</span>
            <input id="adminActive" type="checkbox" checked>
          </label>
          <button id="saveUser" class="primary" type="submit"><i data-lucide="save"></i><span>Save user</span></button>
          <div id="adminNotice" class="notice"></div>
        </form>

        <section class="panel">
          <div class="panel-head"><h2>User Management</h2></div>
          <div class="panel-body">
            <div id="users"></div>
          </div>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
