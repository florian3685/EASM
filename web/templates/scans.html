<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scans · link-ed.it CyberScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script defer src="/static/js/common.js"></script>
  <script defer src="/static/js/scans.js"></script>
</head>
<body data-page="scans">
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/dashboard">
        <span class="brand-logo-wrap"><img class="brand-logo" src="/static/img/link-ed.it-logo.png" alt="link-ed.it Consulting & Services"></span>
        <span><span class="brand-title">CyberScan</span><span class="brand-subtitle">Security operations console</span></span>
      </a>
      <nav class="primary-nav" aria-label="Main navigation">
        <a href="/dashboard" data-route-link="dashboard"><i data-lucide="layout-dashboard"></i>Dashboard</a>
        <a href="/scans" data-route-link="scans"><i data-lucide="radar"></i>Scans</a>
        <a href="/reports" data-route-link="reports"><i data-lucide="file-text"></i>Reports</a>
        <a href="/admin/users" data-route-link="admin-users" data-admin-only="true"><i data-lucide="users"></i>Users</a>
      </nav>
      <div class="top-actions">
        <button class="icon-button" type="button" data-command-open title="Command palette" aria-label="Command palette"><i data-lucide="search"></i></button>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle theme"></button>
        <div class="userbox"><span id="userLabel">local</span><a class="logout" href="/logout"><i data-lucide="log-out"></i>Logout</a></div>
      </div>
    </header>

    <main class="page wide">
      <div class="page-head">
        <div>
          <p class="eyebrow">Scans</p>
          <h1 class="page-title">Launch and monitor</h1>
          <p class="page-copy">Compose authorized customer-domain scans and watch execution logs in real time.</p>
        </div>
        <div class="filter-bar">
          <input id="jobSearch" type="search" placeholder="Filter jobs">
          <button id="refresh" class="icon-button" type="button" title="Refresh" aria-label="Refresh"><i data-lucide="refresh-cw"></i></button>
        </div>
      </div>

      <div class="grid scan-grid">
        <section class="panel">
          <div class="panel-head"><h2>Customer Scan</h2></div>
          <div class="panel-body">
            <div class="field">
              <label for="domain">Customer domain</label>
              <input id="domain" type="text" placeholder="kunde.de" autocomplete="off">
            </div>
            <div class="field">
              <label>Profile</label>
              <div id="profiles" class="profiles"></div>
            </div>
            <div class="field">
              <label>Modules</label>
              <div id="modules" class="modules"></div>
            </div>
            <div class="field">
              <label>Options</label>
              <div class="toggles">
                <label class="switch-row"><span><strong>Rate jitter</strong><span>Jitter and browser-like request headers</span></span><input id="stealth" type="checkbox" checked></label>
                <label class="switch-row"><span><strong>Exploit mode</strong><span>Required for module 11</span></span><input id="exploit" type="checkbox"></label>
                <label class="switch-row"><span><strong>Fresh scan</strong><span>Ignore stored checkpoint</span></span><input id="fresh" type="checkbox"></label>
                <label class="switch-row"><span><strong>Customer authorization</strong><span>Written approval or contract scope is confirmed</span></span><input id="authorized" type="checkbox"></label>
              </div>
            </div>
            <div class="actions">
              <button id="startScan" class="primary" type="button"><i data-lucide="play"></i><span>Start customer scan</span></button>
              <button id="selectSafe" class="secondary" type="button"><i data-lucide="shield-check"></i><span>Internal default</span></button>
            </div>
            <div id="notice" class="notice"></div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h2>Scan Queue</h2></div>
          <div class="panel-body">
            <div id="jobs" class="job-list"></div>
          </div>
        </section>
      </div>

      <section id="schedule" class="panel planner-panel">
        <div class="panel-head">
          <h2>Scan Planner</h2>
          <div class="panel-actions">
            <button id="refreshSchedule" class="icon-button" type="button" title="Refresh planner" aria-label="Refresh planner"><i data-lucide="refresh-cw"></i></button>
          </div>
        </div>
        <div class="panel-body">
          <div class="planner-grid">
            <form id="scheduleForm" class="schedule-form">
              <div class="field">
                <label for="scheduleDomain">Customer domain</label>
                <input id="scheduleDomain" type="text" placeholder="kunde.de" autocomplete="off">
              </div>
              <div class="form-row">
                <div class="field">
                  <label for="scheduleProfile">Profile</label>
                  <select id="scheduleProfile"></select>
                </div>
                <div class="field">
                  <label for="scheduleCadence">Every days</label>
                  <input id="scheduleCadence" type="number" min="1" max="365" value="30">
                </div>
                <div class="field">
                  <label for="scheduleNext">Next scan</label>
                  <input id="scheduleNext" type="date">
                </div>
              </div>
              <div class="toggles">
                <label class="switch-row"><span><strong>Active schedule</strong><span>Visible in due-scan overview</span></span><input id="scheduleActive" type="checkbox" checked></label>
                <label class="switch-row"><span><strong>Customer authorization</strong><span>Written approval or contract scope is confirmed</span></span><input id="scheduleAuthorized" type="checkbox"></label>
              </div>
              <div class="actions">
                <button id="saveSchedule" class="primary" type="submit"><i data-lucide="calendar-plus"></i><span>Save schedule</span></button>
              </div>
              <div id="scheduleNotice" class="notice"></div>
            </form>
            <div>
              <div id="scheduleStats" class="mini-metrics"></div>
              <div id="scheduleList" class="schedule-list"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
